<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
    
    <!-- Logo / Title -->
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-gray-800">Welcome Back 👋</h2>
      <p class="text-gray-500 text-sm">Login to your account</p>
    </div>

    <!-- Form -->
    <form>
      
      <!-- Email -->
      <div class="mb-4">
        <label class="block text-gray-600 text-sm mb-2">Email</label>
        <input 
          type="email" 
          placeholder="Enter your email"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block text-gray-600 text-sm mb-2">Password</label>
        <input 
          type="password" 
          placeholder="Enter your password"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>

      <!-- Remember + Forgot -->
      <div class="flex items-center justify-between mb-6">
        <label class="flex items-center text-sm text-gray-600">
          <input type="checkbox" class="mr-2">
          Remember me
        </label>
        <a href="#" class="text-sm text-blue-500 hover:underline">
          Forgot Password?
        </a>
      </div>

      <!-- Login Button -->
      <button 
        type="submit"
        class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition duration-300"
      >
        Login
      </button>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <hr class="flex-grow border-gray-300">
        <span class="px-2 text-gray-400 text-sm">OR</span>
        <hr class="flex-grow border-gray-300">
      </div>

      <!-- Social Login -->
      <div class="space-y-3">
        <button class="w-full border py-2 rounded-lg flex items-center justify-center hover:bg-gray-50">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 mr-2">
          Continue with Google
        </button>

        <button class="w-full border py-2 rounded-lg flex items-center justify-center hover:bg-gray-50">
          <img src="https://www.svgrepo.com/show/448234/facebook.svg" class="w-5 mr-2">
          Continue with Facebook
        </button>
      </div>

      <!-- Signup -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Don’t have an account?
        <a href="#" class="text-blue-500 hover:underline">Sign up</a>
      </p>

    </form>
  </div>

</body>
</html>
